name: Build & Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GCP_PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:       us-central1
  BACKEND_SERVICE:  cricket-backend
  FRONTEND_SERVICE: cricket-frontend
  REGISTRY:         us-central1-docker.pkg.dev
  REPO:             cricket-analytics

jobs:

  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPO/$BACKEND_SERVICE:$GITHUB_SHA \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPO/$BACKEND_SERVICE:latest \
            .

      - name: Push backend image
        run: |
          docker push $REGISTRY/$GCP_PROJECT_ID/$REPO/$BACKEND_SERVICE:$GITHUB_SHA
          docker push $REGISTRY/$GCP_PROJECT_ID/$REPO/$BACKEND_SERVICE:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGISTRY/$GCP_PROJECT_ID/$REPO/$BACKEND_SERVICE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --set-env-vars="DB_HOST=${{ secrets.DB_HOST }}" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars="DB_PORT=${{ secrets.DB_PORT }}" \
            --set-env-vars="MODEL_PATH=${{ secrets.MODEL_PATH }}" \
            --set-env-vars="GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}"

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build frontend image
        run: |
          docker build \
            -f Dockerfile.frontend \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_URL }} \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPO/$FRONTEND_SERVICE:$GITHUB_SHA \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPO/$FRONTEND_SERVICE:latest \
            ./cricket-analytics

      - name: Push frontend image
        run: |
          docker push $REGISTRY/$GCP_PROJECT_ID/$REPO/$FRONTEND_SERVICE:$GITHUB_SHA
          docker push $REGISTRY/$GCP_PROJECT_ID/$REPO/$FRONTEND_SERVICE:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $REGISTRY/$GCP_PROJECT_ID/$REPO/$FRONTEND_SERVICE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1
